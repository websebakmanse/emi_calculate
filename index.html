<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="calculator-container">
        <div class="row g-4">
            <!-- Input Box -->
            <div class="col-md-6">
                <div class="box">
                    <h4>EMI Input</h4>
                    <div class="mb-3">
                        <label for="principal" class="form-label">Loan Amount (₹)</label>
                        <input type="number" class="form-control" id="principal" placeholder="Enter loan amount">
                    </div>
                    <div class="mb-3">
                        <label for="rate" class="form-label">Interest Rate (% per year)</label>
                        <input type="number" class="form-control" id="rate" placeholder="Enter interest rate">
                    </div>
                    <div class="mb-3">
                        <label for="time" class="form-label">Loan Tenure</label>
                        <input type="number" class="form-control" id="time" placeholder="Enter tenure">
                    </div>
                    <div class="mb-3">
                        <label for="mode" class="form-label">Mode</label>
                        <select class="form-select" id="mode">
                            <option value="year" selected>Year</option>
                            <option value="month">Month</option>
                        </select>
                    </div>
                    <button class="btn btn-calc w-100" onclick="calculateEMI()">Calculate EMI</button>
                    <button class="btn btn-reset w-100" onclick="resetCalculator()">Reset</button>
                </div>
            </div>

            <!-- Result Box -->
            <div class="col-md-6">
                <div class="box text-center">
                    <h4>EMI Result</h4>
                    <p>Monthly EMI: <span class="result" id="emiResult">₹0</span></p>
                    <p>Total Payment: <span class="result" id="totalPayment">₹0</span></p>
                    <p>Total Interest: <span class="result" id="totalInterest">₹0</span></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
